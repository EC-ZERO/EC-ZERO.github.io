<!DOCTYPE html>
<html class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People | EC-ZERO Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#3b82f6', DEFAULT: '#1d4ed8', dark: '#1e3a8a' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        /* 💡 核心显隐逻辑 */
        .lang-zh-content { display: none; }
        [lang="zh"] .lang-zh-content { display: block; }
        [lang="zh"] .lang-en-content { display: none; }
    </style>
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div id="navbar-placeholder"></div>

    <header class="pt-40 pb-20 bg-brand-dark text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <div class="lang-en-content">
                <h1 class="text-5xl font-extrabold mb-4">Our Team</h1>
                <p class="text-xl text-blue-100 max-w-2xl mx-auto">Meet the researchers <br />behind our electrocatalysis works.</p>
            </div>
            <div class="lang-zh-content">
                <h1 class="text-5xl font-extrabold mb-4">成员介绍</h1>
                <p class="text-xl text-blue-100 max-w-2xl mx-auto"> 认识我们<br />共建电催化前沿团队</p>
            </div>
        </div>
    </header>

    <section class="py-24 bg-white min-h-screen">
        <div id="people-page-container" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="animate-pulse space-y-12">
                <div class="h-64 bg-gray-100 rounded-3xl"></div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="/js/app.js"></script>
    <script>
        // 初始化语言状态
        document.addEventListener('DOMContentLoaded', () => {
            const lang = localStorage.getItem('lab_lang') || 'en';
            document.documentElement.setAttribute('lang', lang);
        });
    </script>
</body>
</html>
