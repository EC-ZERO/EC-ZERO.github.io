name: Sync to GitHub and CNB (Incremental & Strict Patching)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install

      # ==========================================
      # 第一阶段：为 GitHub Pages 构建并发布
      # ==========================================
      - name: Build for GitHub
        run: npm run build -- --base=/
          
      - name: Push to GitHub Deploy Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy

      # ==========================================
      # 第二阶段：为学校官网构建并进行“全路径补丁”
      # ==========================================
      - name: Build for School
        run: npm run build -- --base=/ec-zero/

      - name: Patch Hardcoded Paths for School
        # 【关键修正】增加了对 *.json 文件的处理
        run: |
          # 1. 动态获取所有手术清单，确保包含 .xml 和 .json
          TARGET_FILES=$(find dist -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" -o -name "*.json" -o -name "*.xml" \))
          
          if [ -z "$TARGET_FILES" ]; then
            echo "No files found to patch."
          else
            echo "Found files to patch. Starting precision surgery..."
            
            # 【关键修正 1】先处理域名替换，但不带末尾斜杠以确保最大匹配率
            # 这会把 sitemap.xml 里的链接全部修正
            sed -i 's|https://gift.sjtu.edu.cn|https://gift.sjtu.edu.cn/ec-zero|g' $TARGET_FILES || true
            sed -i 's|https://ec-zero.github.io|https://gift.sjtu.edu.cn/ec-zero|g' $TARGET_FILES || true

            # 【关键修正 2：救护车逻辑】把误伤的学院官网主页链接改回来
            # 这样 footer 里的 /en 链接就会恢复正常，不再指向 /ec-zero/en
            sed -i 's|https://gift.sjtu.edu.cn/ec-zero/en|https://gift.sjtu.edu.cn/en|g' $TARGET_FILES || true
            
            # 2. 处理 content、data 和 images 路径
            sed -i 's|"/content/|"/ec-zero/content/|g' $TARGET_FILES || true
            sed -i "s|'/content/|'/ec-zero/content/|g" $TARGET_FILES || true
            sed -i 's|"/data/|"/ec-zero/data/|g' $TARGET_FILES || true
            sed -i "s|'/data/|'/ec-zero/data/|g" $TARGET_FILES || true
            sed -i 's|"/images/|"/ec-zero/images/|g' $TARGET_FILES || true
            sed -i "s|'/images/|'/ec-zero/images/|g" $TARGET_FILES || true
            
            # 3. 处理根目录单张图片
            for img in hero.webp hydrogen.webp membrane.webp spin.webp; do
              sed -i "s|\"/$img\"|\"/ec-zero/$img\"|g" $TARGET_FILES || true
              sed -i "s|'/$img'|'/ec-zero/$img'|g" $TARGET_FILES || true
            done
            
            # 4. 最终收尾：清理可能产生的双斜杠 (如 /ec-zero//index.html)
            sed -i 's|ec-zero//|ec-zero/|g' $TARGET_FILES || true
            
            echo "Precision patching completed."
          fi

      # ==========================================
      # 第三阶段：增量同步到 cnb.cool (保留历史日志)
      # ==========================================
      - name: Push to cnb.cool (Incremental)
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          # 1. 建立临时工作区
          mkdir -p ../temp_cnb
          # 2. 克隆学校现有的仓库（这样才有 history）
          git clone https://cnb:${{ secrets.CNB_TOKEN }}@cnb.cool/SJTU-EC-ZERO/EC-ZERO.github.io.git ../temp_cnb
          
          # 3. 将新的打包内容同步进去，但保留原有的 .git 文件夹
          cp -rn ../temp_cnb/.git ./dist/
          cd dist
          
          # 4. 提交并推送（这样就变成了正常的增量 commit）
          git config user.name "Kevin Zhao Weiming (via Action)"
          git config user.email "action@github.com"
          git add -A
          # 只有在有变化时才 commit
          git diff-index --quiet HEAD || git commit -m "Site Update: ${{ github.event.head_commit.message }} (Patched for Subdirectory)"
          git push origin main