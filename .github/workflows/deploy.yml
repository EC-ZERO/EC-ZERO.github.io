name: Sync to GitHub and CNB

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install and Build
        run: |
          npm install
          npm run build
          
      # 1. 第一发：推送到 GitHub 的 deploy 分支 (用于你的 github.io 预览)
      - name: Push to GitHub Deploy Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy
          commit_message: "Site updated: ${{ github.event.head_commit.message }}"

      # 2. 第二发：强制同步到 cnb.cool (用于学校服务器拉取)
      - name: Push to cnb.cool
        env:
          # 调用你刚才在 GitHub Secrets 里存的那个 Token
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          cd dist
          git init
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Deploy from GitHub Action to CNB"
          # 使用你提到的 cnb 用户名和 Token 进行鉴权推送
          git push --force https://cnb:${{ secrets.CNB_TOKEN }}@cnb.cool/SJTU-EC-ZERO/EC-ZERO.github.io.git main