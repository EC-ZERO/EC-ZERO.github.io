name: Sync to GitHub and CNB (Strict Patching)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install

      # ==========================================
      # 第一阶段：为 GitHub Pages 构建并发布 (Root Base)
      # ==========================================
      - name: Build for GitHub
        run: npm run build -- --base=/
          
      - name: Push to GitHub Deploy Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy
          commit_message: "Site updated (Root): ${{ github.event.head_commit.message }}"

      # ==========================================
      # 第二阶段：为学校官网构建、修复路径并同步到 CNB
      # ==========================================
      - name: Build for School
        run: npm run build -- --base=/ec-zero/

      - name: Patch Hardcoded Paths for School
        run: |
          # 1. 处理 content 和 data 路径
          find dist -type f \( -name "*.js" -o -name "*.html" \) -exec sed -i 's|"/content/|"/ec-zero/content/|g' {} +
          find dist -type f \( -name "*.js" -o -name "*.html" \) -exec sed -i "s|'/content/|'/ec-zero/content/|g" {} +
          find dist -type f \( -name "*.js" -o -name "*.html" \) -exec sed -i 's|"/data/|"/ec-zero/data/|g' {} +
          find dist -type f \( -name "*.js" -o -name "*.html" \) -exec sed -i "s|'/data/|'/ec-zero/data/|g" {} +
          
          # 2. 处理 images 目录（非常重要）
          find dist -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" \) -exec sed -i 's|"/images/|"/ec-zero/images/|g' {} +
          find dist -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" \) -exec sed -i "s|'/images/|'/ec-zero/images/|g" {} +
          
          # 3. 处理根目录下的单张图片 (hero.webp, hydrogen.webp 等)
          # 为了防止误伤，我们匹配 "/名字.webp" 这种格式
          for img in hero.webp hydrogen.webp membrane.webp spin.webp; do
            find dist -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" \) -exec sed -i "s|\"/$img\"|\"/ec-zero/$img\"|g" {} +
            find dist -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" \) -exec sed -i "s|'/$img'|'/ec-zero/$img'|g" {} +
          done
          
          echo "All paths including images have been patched for subdirectory."

      - name: Push to cnb.cool
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          cd dist
          git init
          git checkout -b main
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Deploy for School Subdirectory (Patched Quotes)"
          git push --force https://cnb:${{ secrets.CNB_TOKEN }}@cnb.cool/SJTU-EC-ZERO/EC-ZERO.github.io.git main