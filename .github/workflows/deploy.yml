name: Build and Deploy (Branch + Pages)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install and Build
        run: |
          npm install
          npm run build
          
      - name: Push to Deploy Branch
        uses: peaceiris/actions-gh-pages@v4 # 升级到 v4 更稳定
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy # 所有的静态文件都会在这里
          commit_message: "Site updated: ${{ github.event.head_commit.message }}"