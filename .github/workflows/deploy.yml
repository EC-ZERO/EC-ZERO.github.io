name: Sync to GitHub and CNB (Incremental & Strict Patching)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install

      # ==========================================
      # 第一阶段：为 GitHub Pages 构建并发布
      # ==========================================
      - name: Build for GitHub
        run: npm run build -- --base=/
          
      - name: Push to GitHub Deploy Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy

      # ==========================================
      # 第二阶段：为学校官网构建并进行“全路径补丁”
      # ==========================================
      - name: Build for School
        run: npm run build -- --base=/ec-zero/

      - name: Patch Hardcoded Paths for School
        # 【关键修正】增加了对 *.json 文件的处理
        run: |
          # 1. 明确手术区域
          # 专门提取 Sitemap 文件，因为它需要进行域名级别的替换（从根域名到子目录域名）
          SITEMAP_FILE="dist/sitemap.xml"
          
          # 动态获取常规资源文件清单（JS, HTML, CSS, JSON）
          # 注意：这里特意排除了 .xml 文件，防止全局域名替换误伤到 Footer 等组件里的外部官网链接
          RESOURCE_FILES=$(find dist -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" -o -name "*.json" \))
          
          echo "Starting precision surgery for EC-ZERO Lab..."

          # =============================================================
          # 【关键点 1】只针对 sitemap.xml 进行域名升级
          # =============================================================
          # 逻辑：Sitemap 必须包含完整路径才能保证 SEO 正确。
          # 这样操作可以确保 footer.html 和 footer_cn.html 里的官网链接保持原样，不会被误改为 /ec-zero/en
          if [ -f "$SITEMAP_FILE" ]; then
            echo "Patching Sitemap domain: Correcting links to include /ec-zero/ subdirectory..."
            sed -i 's|https://gift.sjtu.edu.cn/|https://gift.sjtu.edu.cn/ec-zero/|g' "$SITEMAP_FILE" || true
            sed -i 's|https://ec-zero.github.io/|https://gift.sjtu.edu.cn/ec-zero/|g' "$SITEMAP_FILE" || true
          fi

          # =============================================================
          # 【关键点 2】对所有资源文件进行路径修复
          # =============================================================
          # 逻辑：将所有硬编码的绝对路径（如 /content/）替换为相对于学校子目录的路径（如 /ec-zero/content/）
          if [ -n "$RESOURCE_FILES" ]; then
            echo "Patching resource paths in HTML/JS/JSON/CSS..."
            
            # A. 处理核心目录：content（内容片段）、data（JSON数据）、images（媒体资源）
            # 同时兼容单引号和双引号的匹配
            sed -i 's|"/content/|"/ec-zero/content/|g' $RESOURCE_FILES || true
            sed -i "s|'/content/|'/ec-zero/content/|g" $RESOURCE_FILES || true
            sed -i 's|"/data/|"/ec-zero/data/|g' $RESOURCE_FILES || true
            sed -i "s|'/data/|'/ec-zero/data/|g" $RESOURCE_FILES || true
            sed -i 's|"/images/|"/ec-zero/images/|g' $RESOURCE_FILES || true
            sed -i "s|'/images/|'/ec-zero/images/|g" $RESOURCE_FILES || true
            
            # B. 处理根目录下的单张静态图片（如 hero.webp, hydrogen.webp 等）
            # 这些图片不在 images 文件夹内，需要单独进行精准匹配替换
            for img in hero.webp hydrogen.webp membrane.webp spin.webp; do
              sed -i "s|\"/$img\"|\"/ec-zero/$img\"|g" $RESOURCE_FILES || true
              sed -i "s|'/$img'|'/ec-zero/$img'|g" $RESOURCE_FILES || true
            done
            
            # C. 最终收尾：清理可能产生的双斜杠风险（防止出现 ec-zero//path）
            # 这能确保生成的 URL 在浏览器控制台里看起来极其专业，没有任何冗余
            sed -i 's|ec-zero//|ec-zero/|g' $RESOURCE_FILES || true
          fi
          
          echo "Surgery successful. All internal paths corrected. No collateral damage to external links."

      # ==========================================
      # 第三阶段：增量同步到 cnb.cool (保留历史日志)
      # ==========================================
      - name: Push to cnb.cool (Incremental)
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          # 1. 建立临时工作区
          mkdir -p ../temp_cnb
          # 2. 克隆学校现有的仓库（这样才有 history）
          git clone https://cnb:${{ secrets.CNB_TOKEN }}@cnb.cool/SJTU-EC-ZERO/EC-ZERO.github.io.git ../temp_cnb
          
          # 3. 将新的打包内容同步进去，但保留原有的 .git 文件夹
          cp -rn ../temp_cnb/.git ./dist/
          cd dist
          
          # 4. 提交并推送（这样就变成了正常的增量 commit）
          git config user.name "Kevin Zhao Weiming (via Action)"
          git config user.email "action@github.com"
          git add -A
          # 只有在有变化时才 commit
          git diff-index --quiet HEAD || git commit -m "Site Update: ${{ github.event.head_commit.message }} (Patched for Subdirectory)"
          git push origin main