    <script>
    /**
     * 防爬虫邮件联系函数
     * 原理：只有在用户真实点击时，才在内存中拼凑出邮箱地址
     */
    window.handleContact = function(e) {
        // 防止默认行为
        if (e) e.preventDefault();
        
        // 拆分邮箱地址，让爬虫无法通过正则匹配完整字符串
        const user = 'ec-zero';
        const domain = 'sjtu.edu.cn';
        const subject = 'Inquiry from EC-ZERO Lab Website';
        
        // 动态拼凑并唤起邮件客户端
        const fullAddress = user + '@' + domain;
        window.location.href = 'mailto:' + fullAddress + '?subject=' + encodeURIComponent(subject);
    };
</script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. 获取当前语言
        const currentLang = localStorage.getItem('lab_lang') || 'en';
        
        // 2. 设置按钮显示的文案：如果你是英文，按钮就显示“中文”；反之亦然
        const toggleText = document.getElementById('lang-toggle-text');
        if (toggleText) {
            toggleText.innerText = currentLang === 'en' ? '中文' : 'English';
        }

        // 3. 处理页面上硬编码的文字 (data-zh / data-en)
        document.querySelectorAll('[data-zh]').forEach(el => {
            el.innerText = el.getAttribute('data-' + currentLang);
        });
    });

    // 4. 定义点击切换的函数
    function handleToggleLanguage() {
        const currentLang = localStorage.getItem('lab_lang') || 'en';
        // 切换逻辑：如果是 en 就切到 zh，如果是 zh 就切到 en
        const targetLang = currentLang === 'en' ? 'zh' : 'en';
        
        // 调用你在 app.js 里写的那个全局函数
        if (typeof window.switchLanguage === 'function') {
            window.switchLanguage(targetLang);
        } else {
            // 万一 app.js 没加载完，这里做个兜底
            localStorage.setItem('lab_lang', targetLang);
            window.location.reload();
        }
    }
</script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const lang = localStorage.getItem('lab_lang') || 'en';
        
        // 自动查找所有带有 data-en 和 data-zh 的元素进行替换
        document.querySelectorAll('[data-zh]').forEach(el => {
            el.innerText = el.getAttribute('data-' + lang);
        });

        // 也可以顺便高亮当前选中的语言按钮
        if(lang === 'zh') {
            document.querySelector('.lang-zh-btn')?.classList.add('bg-brand', 'text-white');
        } else {
            document.querySelector('.lang-en-btn')?.classList.add('bg-brand', 'text-white');
        }
    });
</script>
